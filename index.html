<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ship Power Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #040d04; font-family: monospace; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 20px; }

    .outer { background: #061006; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; width: 100%; max-width: 1000px; border: 1px solid #1e4d1e; }

    /* --- SCHEMATIC ROW --- */
    .schematic-row { display: flex; width: 100%; align-items: stretch; }
    .ship-wrap { flex: 1; position: relative; }
    .ship-wrap img { width: 100%; height: auto; display: block; filter: brightness(0.9); }

    /* --- LIVE SYSTEM OVERLAYS (tint + bloom that recolor each ship system) --- */
    .ov { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
    .tint { mix-blend-mode: color; }
    .bloom { mix-blend-mode: screen; filter: blur(0.7px); opacity: .38; }
    .zone { transition: color .3s ease; }
    .tint-svg .zone * { fill: currentColor; stroke: none; }
    .bloom-svg .zone * { fill: none; stroke: currentColor; stroke-width: 1.6; }
    @keyframes pz { 0%,100%{opacity:1} 50%{opacity:.15} }
    .zone.pulse { animation: pz 0.8s ease-in-out infinite; }

    /* --- INSET PROGRESS BARS (overlaid on the schematic's power panel) --- */
    .bar-overlay { position: absolute; inset: 0; pointer-events: none; }
    .ibar { position: absolute; border-radius: 2px; overflow: hidden; background: rgba(8, 22, 8, 0.35); }
    .ibar-fill { height: 100%; width: 25%; border-radius: 2px; background: #4ade80;
                 box-shadow: 0 0 7px rgba(74, 222, 128, 0.75), inset 0 0 4px rgba(190, 255, 210, 0.5);
                 transition: width 0.25s ease, opacity 0.25s; }

    /* --- MAIN POWER PANEL (second panel) --- */
    .power-panel { width: 220px; background: #061006; border-left: 1.5px solid #1e4d1e; display: flex; flex-direction: column; }
    .pp-title { background: #0a1e0a; border-bottom: 1.5px solid #1e4d1e; text-align: center; font-size: 10px; letter-spacing: 2px; color: #4ade80; padding: 8px 4px; font-weight: 500; }
    .pp-main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 10px; padding: 14px 16px; text-align: center; }
    .mp-label { font-size: 10px; letter-spacing: 2px; color: #2d6a2d; }
    .engine-status { font-size: 18px; font-weight: 600; letter-spacing: 3px; color: #4ade80; transition: color 0.2s; }
    .pp-top-bar-wrap { width: 100%; height: 22px; background: #0a1a0a; border: 1px solid #1e4d1e; border-radius: 2px; overflow: hidden; display: flex; }
    .seg { height: 100%; transition: width 0.25s; }
    .total-row { display: flex; flex-direction: column; gap: 2px; font-size: 9px; color: #2d6a2d; letter-spacing: 1px; }
    .total-val { font-size: 22px; font-weight: 600; color: #4ade80; letter-spacing: 1px; }
    .total-val.over { color: #ef4444; }

    /* --- SLIDERS --- */
    .sliders-row { background: #061006; border-top: 1.5px solid #1e4d1e; padding: 10px 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; }
    .sl-block { display: flex; flex-direction: column; gap: 3px; }
    .sl-header { display: flex; justify-content: space-between; align-items: center; }
    .sl-name { font-size: 9px; letter-spacing: 2px; color: #2d6a2d; }
    .sl-pct { font-size: 13px; font-weight: 500; color: #4ade80; transition: color 0.2s; }
    .sl-pct.low { color: #ef4444; }
    .sl-pct.warn { color: #f59e0b; }
    input[type=range] { width: 100%; accent-color: #4ade80; cursor: pointer; }

    /* --- LOG --- */
    .log-area { background: #040d04; border-top: 1.5px solid #1e4d1e; padding: 8px 12px; max-height: 160px; overflow-y: auto; display: flex; flex-direction: column; }
    .log-hdr { font-size: 9px; letter-spacing: 2px; color: #1e4d1e; margin-bottom: 4px; }
    .log-entry { font-size: 10px; line-height: 1.7; display: flex; gap: 8px; border-bottom: 0.5px solid #0a1e0a; }
    .log-t { color: #1e6b1e; min-width: 52px; }
    .log-m { color: #4ade80; }
    .log-m.drop { color: #ef4444; }
    .log-m.gain { color: #4ade80; }
    .log-m.warn { color: #f59e0b; }
  </style>
</head>
<body>

        </g>

        </g>
        <g id="t-wpn" class="zone" style="color:#4ade80">
          <rect x="540" y="458" width="146" height="32" rx="5"/>
          <polygon points="640,565 645,574 672,577 674,579 643,582 634,582 621,577 621,574 632,574 631,565 592,570 589,581 603,604 628,598 656,604 662,613 662,623 654,631 637,638 617,641 588,637 573,627 572,621 603,604 589,581 595,567 605,564 631,565"/>

        <div class="ibar" style="left:74.8%; top:62.5%; width:21.6%; height:5.8%">
          <div class="ibar-fill" id="ifill-weapons"></div>
        </div>
        <div class="ibar" style="left:74.8%; top:80.6%; width:21.6%; height:5.8%">

    </div>

    <!-- Main power indicator (second panel) -->
    <div class="power-panel">
      <div class="pp-title">main power</div>
      <div class="pp-main">
        <span class="mp-label">reactor status</span>
        <span class="engine-status" id="engine-status">NOMINAL</span>
        <div class="pp-top-bar-wrap">
          <div class="seg" id="seg-sys"     style="width:25%;background:#4ade80"></div>
          <div class="seg" id="seg-drones"  style="width:25%;background:#2bbf6a"></div>
          <div class="seg" id="seg-weapons" style="width:25%;background:#1c9c52"></div>
          <div class="seg" id="seg-shields" style="width:25%;background:#137a3c"></div>
          <div class="seg" id="seg-empty"   style="width:0%;background:#0a1a0a"></div>
        </div>
        <div class="total-row">
          <span class="total-val" id="total-val-disp">100%</span>
          <span>total allocated</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Sliders -->
  <div class="sliders-row">
    <div class="sl-block">
      <div class="sl-header">
        <span class="sl-name">⬡ engines</span>
        <span class="sl-pct" id="pct-sys">25%</span>
      </div>
      <input type="range" min="0" max="25" step="1" value="25" id="sl-sys" oninput="onSlide('sys',this.value)">
    </div>
    <div class="sl-block">
      <div class="sl-header">
        <span class="sl-name">⬡ drones</span>
        <span class="sl-pct" id="pct-drones">25%</span>
      </div>
      <input type="range" min="0" max="25" step="1" value="25" id="sl-drones" oninput="onSlide('drones',this.value)">
    </div>
    <div class="sl-block">
      <div class="sl-header">
        <span class="sl-name">⬡ weapons</span>
        <span class="sl-pct" id="pct-weapons">25%</span>
      </div>
      <input type="range" min="0" max="25" step="1" value="25" id="sl-weapons" oninput="onSlide('weapons',this.value)">
    </div>
    <div class="sl-block">
      <div class="sl-header">
        <span class="sl-name">⬡ shields</span>
        <span class="sl-pct" id="pct-shields">25%</span>
      </div>
      <input type="range" min="0" max="25" step="1" value="25" id="sl-shields" oninput="onSlide('shields',this.value)">
    </div>
  </div>

  <!-- Status Log -->
  <div class="log-area">
    <div class="log-hdr">▸ system status log</div>
    <div id="log-entries">
      <div class="log-entry">
        <span class="log-t">00:00:00</span>
        <span class="log-m">— power grid initialized. engines and all systems nominal at 25%.</span>
      </div>
    </div>
  </div>

</div>

<script>
  const LABELS = { sys:'Engines', drones:'Drones', weapons:'Weapons', shields:'Shields' };
  const ZONE   = { sys:'eng', drones:'drn', weapons:'wpn', shields:'shd' };
  const prev   = { sys:25, drones:25, weapons:25, shields:25 };

  // Map a 0-25 power level to an overlay colour + flash state.
  //   0-4   flashing red      5-10  flashing orange
  //   11-15 solid orange      16-20 solid yellow      21-25 solid green
  function zoneColor(v) {
    if (v <= 4)  return { c:'#ef4444', pulse:true  };
    if (v <= 10) return { c:'#f97316', pulse:true  };
    if (v <= 15) return { c:'#f97316', pulse:false };
    if (v <= 20) return { c:'#facc15', pulse:false };
    return         { c:'#4ade80', pulse:false };
  }
  const t0 = Date.now();

  function ts() {
    const s = Math.floor((Date.now()-t0)/1000);
    return [Math.floor(s/3600), Math.floor((s%3600)/60), s%60]
      .map(n=>String(n).padStart(2,'0')).join(':');
  }

  function log(msg, type) {
    const el = document.getElementById('log-entries');
    const r  = document.createElement('div');
    r.className = 'log-entry';
    r.innerHTML = `<span class="log-t">${ts()}</span><span class="log-m ${type||''}">${msg}</span>`;
    el.prepend(r);
    if (el.children.length > 60) el.lastChild.remove();
  }

  function val(k) { return parseInt(document.getElementById('sl-'+k).value); }

  function onSlide(key, rawVal) {
    let v = parseInt(rawVal);
    const others = ['sys','drones','weapons','shields'].filter(k=>k!==key);
    const otherSum = others.reduce((a,k)=>a+val(k), 0);
    if (v + otherSum > 100) { v = Math.max(0, 100 - otherSum); }
    document.getElementById('sl-'+key).value = v;

    updateAll();

    const p = prev[key], lbl = LABELS[key];
    if (v < p) {
      if (v === 0) log(`⚡ ${lbl} OFFLINE — power cut. system down.`, 'drop');
      else         log(`↓ ${lbl} power ${p}% → ${v}%.`, 'drop');
    } else if (v > p) {
      if (p === 0) log(`↑ ${lbl} RESTORED — online at ${v}%.`, 'gain');
      else         log(`↑ ${lbl} power ${p}% → ${v}%.`, 'gain');
    }
    prev[key] = v;
  }

  function updateAll() {
    const vals = { sys:val('sys'), drones:val('drones'), weapons:val('weapons'), shields:val('shields') };
    const total     = vals.sys + vals.drones + vals.weapons + vals.shields;
    const remaining = Math.max(0, 100 - total);

    ['sys','drones','weapons','shields'].forEach(k => {
      const v = vals[k];

      // Slider pct label
      const pctEl = document.getElementById('pct-'+k);
      pctEl.textContent = v+'%';
      pctEl.className = 'sl-pct' + (v===0?' low': v<=8?' warn':'');

      // Inset progress bar (over the schematic's power panel)
      const fill = document.getElementById('ifill-'+k);
      fill.style.width   = ((v/25)*100)+'%';
      fill.style.opacity = v===0 ? '0' : '1';

      // Live system overlay (tint + bloom recolour the ship system)
      const { c, pulse } = zoneColor(v);
      ['t-','b-'].forEach(pre => {
        const g = document.getElementById(pre+ZONE[k]);
        g.style.color = c;
        g.classList.toggle('pulse', pulse);
      });

      // Allocation segment (main power indicator)
      document.getElementById('seg-'+k).style.width = v+'%';
    });

    document.getElementById('seg-empty').style.width = remaining+'%';

    const tv = document.getElementById('total-val-disp');
    tv.textContent = total+'%';
    tv.className = 'total-val' + (total > 100 ? ' over' : '');

    // Reactor status text (driven by engine power)
    const es = document.getElementById('engine-status');
    const ev = vals.sys;
    if      (ev === 0)  { es.textContent='OFFLINE';  es.style.color='#ef4444'; }
    else if (ev <=  8)  { es.textContent='CRITICAL'; es.style.color='#ef4444'; }
    else if (ev <= 16)  { es.textContent='REDUCED';  es.style.color='#f59e0b'; }
    else if (ev <  25)  { es.textContent='PARTIAL';  es.style.color='#9be8b4'; }
    else                { es.textContent='NOMINAL';  es.style.color='#4ade80'; }
  }

  updateAll();
</script>
</body>
</html>
