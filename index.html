<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ship Power Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #040d04; font-family: monospace; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 20px; }

    .outer { background: #061006; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; width: 100%; max-width: 1000px; border: 1px solid #1e4d1e; }

    /* --- DISPLAY MODE MODIFIERS --- */
    body.display-mode .sliders-row { display: none; }
    body.display-mode .log-clear { display: none; }

    /* --- SCHEMATIC ROW --- */
    .schematic-row { display: flex; width: 100%; align-items: stretch; }
    .ship-wrap { flex: 1; position: relative; }
    .ship-wrap img { width: 100%; height: auto; display: block; filter: brightness(0.9); }
    .ship-wrap svg.ov { width: 100%; height: auto; display: block; }

    /* --- LIVE SYSTEM OVERLAYS --- */
    .ov { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
    .tint { mix-blend-mode: color; }
    .bloom { mix-blend-mode: screen; filter: blur(0.7px); opacity: .38; }
    .zone { transition: color .3s ease; }
    .tint-svg .zone * { fill: currentColor; stroke: none; }
    .bloom-svg .zone * { fill: none; stroke: currentColor; stroke-width: 1.6; }
    @keyframes pz { 0%,100%{opacity:1} 50%{opacity:.15} }
    .zone.pulse, .ibar-fill.pulse { animation: pz 0.8s ease-in-out infinite; }

    /* --- INSET PROGRESS BARS --- */
    .bar-overlay { position: absolute; inset: 0; pointer-events: none; }
    .ibar { position: absolute; border-radius: 2px; overflow: hidden; background: rgba(8, 22, 8, 0.35); }
    .ibar-fill { height: 100%; width: 25%; border-radius: 2px; background: #4ade80;
                 box-shadow: 0 0 7px rgba(74, 222, 128, 0.75), inset 0 0 4px rgba(190, 255, 210, 0.5);
                 transition: width 0.25s ease, opacity 0.25s; }

    /* --- MAIN POWER PANEL --- */
    .power-panel { width: 220px; background: #061006; border-left: 1.5px solid #1e4d1e; display: flex; flex-direction: column; }
    .pp-title { background: #0a1e0a; border-bottom: 1.5px solid #1e4d1e; text-align: center; font-size: 10px; letter-spacing: 2px; color: #4ade80; padding: 8px 4px; font-weight: 500; }
    .pp-main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 10px; padding: 14px 16px; text-align: center; }
    .mp-label { font-size: 10px; letter-spacing: 2px; color: #2d6a2d; }
    .engine-status { font-size: 18px; font-weight: 600; letter-spacing: 3px; color: #4ade80; transition: color 0.2s; }
    .pp-top-bar-wrap { width: 100%; height: 22px; background: #0a1a0a; border: 1px solid #1e4d1e; border-radius: 2px; overflow: hidden; display: flex; }
    .seg { height: 100%; transition: width 0.25s; }
    .total-row { display: flex; flex-direction: column; gap: 2px; font-size: 9px; color: #2d6a2d; letter-spacing: 1px; }
    .total-val { font-size: 22px; font-weight: 600; color: #4ade80; letter-spacing: 1px; }
    .total-val.over { color: #ef4444; }

    /* --- SLIDERS --- */
    .sliders-row { background: #061006; border-top: 1.5px solid #1e4d1e; padding: 10px 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; }
    .sl-block { display: flex; flex-direction: column; gap: 3px; }
    .sl-header { display: flex; justify-content: space-between; align-items: center; }
    .sl-name { font-size: 9px; letter-spacing: 2px; color: #2d6a2d; }
    .sl-pct { font-size: 13px; font-weight: 500; color: #4ade80; transition: color 0.2s; }
    .sl-pct.low { color: #ef4444; }
    .sl-pct.warn { color: #f59e0b; }
    input[type=range] { width: 100%; accent-color: #4ade80; cursor: pointer; }

    /* --- LOG --- */
    .log-area { background: #040d04; border-top: 1.5px solid #1e4d1e; padding: 8px 12px; max-height: 160px; overflow-y: auto; display: flex; flex-direction: column; }
    .log-hdr { font-size: 9px; letter-spacing: 2px; color: #1e4d1e; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: #040d04; padding: 2px 0; }
    .log-clear { font: inherit; font-size: 9px; letter-spacing: 1px; color: #2d6a2d; background: transparent; border: 1px solid #1e4d1e; border-radius: 3px; padding: 2px 8px; cursor: pointer; }
    .log-clear:hover { color: #4ade80; border-color: #2c6a2c; background: #0a1a0a; }
    .log-entry { font-size: 10px; line-height: 1.7; display: flex; gap: 8px; border-bottom: 0.5px solid #0a1e0a; }
    .log-t { color: #1e6b1e; min-width: 52px; }
    .log-m { color: #4ade80; }
    .log-m.drop { color: #ef4444; }
    .log-m.gain { color: #4ade80; }
    .log-m.warn { color: #f59e0b; }
  </style>
</head>
<body>

          <polygon points="617.2,114 615.3,108.2 584.3,98.8 585.9,58.5 599.5,51.1 629.2,44.6 708.5,45.9 734.3,52.1 742.1,58.8 741.7,85 739.2,100.1 720.1,108.2 681.4,112.7 680.8,105.6 672.7,100.1 655.3,98.5 639.5,102.1 633.7,106.3 633.4,115"/>

    <div class="power-panel">
      <div class="pp-title">MAIN POWER</div>
      <div class="pp-main">

        <div class="pp-top-bar-wrap">
          <div class="seg" id="seg-sys"     style="width:25%;background:#4ade80"></div>

          <div class="seg" id="seg-shields" style="width:25%;background:#137a3c"></div>

  <div class="sliders-row">
    <div class="sl-block"><div class="sl-header"><span class="sl-name">⬡ ENGINES</span><span class="sl-pct" id="pct-sys">25%</span></div><input type="range" min="0" max="25" step="1" value="25" id="sl-sys"></div>
    <div class="sl-block"><div class="sl-header"><span class="sl-name">⬡ DRONES</span><span class="sl-pct" id="pct-drones">25%</span></div><input type="range" min="0" max="25" step="1" value="25" id="sl-drones"></div>
    <div class="sl-block"><div class="sl-header"><span class="sl-name">⬡ WEAPONS</span><span class="sl-pct" id="pct-weapons">25%</span></div><input type="range" min="0" max="25" step="1" value="25" id="sl-weapons"></div>
    <div class="sl-block"><div class="sl-header"><span class="sl-name">⬡ SHIELDS</span><span class="sl-pct" id="pct-shields">25%</span></div><input type="range" min="0" max="25" step="1" value="25" id="sl-shields"></div>

  <div class="log-area">
    <div class="log-hdr"><span id="log-title">▸ system status log</span><button class="log-clear" id="btn-clear">clear</button></div>
    <div id="log-entries"></div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

  // =========================================================================
  // FIREBASE CONFIG
  // =========================================================================
  const firebaseConfig = {
    apiKey: "AIzaSyAqy2m3QDMYtzjjUUoEki0RSFot69sZwj8",
    authDomain: "shadowrun-ship-db.firebaseapp.com",
    databaseURL: "https://shadowrun-ship-db-default-rtdb.firebaseio.com",
    projectId: "shadowrun-ship-db",
    storageBucket: "shadowrun-ship-db.firebasestorage.app",
    messagingSenderId: "584465229092",
    appId: "1:584465229092:web:d17e05b242a6c99c8c3fb1"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const powerRef = ref(db, 'shipPowerLevels');
  const clearLogRef = ref(db, 'shipLogClearEvent');

  // --- Logic & Display Setup ---
  const LABELS = { sys:'Engines', drones:'Drones', weapons:'Weapons', shields:'Shields' };
  const ZONE   = { sys:'eng', drones:'drn', weapons:'wpn', shields:'shd' };
  const prev   = { sys:25, drones:25, weapons:25, shields:25 };
  
  const isDisplayMode = new URLSearchParams(window.location.search).has('display');
  if (isDisplayMode) {
    document.body.classList.add('display-mode');
    document.getElementById('log-title').textContent = '▸ remote uplink initialized';
  }

  function zoneColor(v) {
    if (v <= 1)   return { c:'#ef4444', pulse:true  };
    if (v <= 2.5) return { c:'#f97316', pulse:true  };
    if (v <= 3.75)return { c:'#f97316', pulse:false };
    if (v <= 5)   return { c:'#facc15', pulse:false };
    return        { c:'#4ade80', pulse:false };
  }

  function statusOf(v) {
    if (v === 0)   return { label:'OFFLINE',  type:'drop' };
    if (v <= 1)    return { label:'CRITICAL', type:'drop' };
    if (v <= 2.5)  return { label:'LOW',      type:'warn' };
    if (v <= 3.75) return { label:'REDUCED',  type:'warn' };
    if (v <= 5)    return { label:'PARTIAL',  type:'warn' };
    return         { label:'NOMINAL',  type:'gain' };
  }

  const t0 = Date.now();
  function ts() {
    const s = Math.floor((Date.now()-t0)/1000);
    return [Math.floor(s/3600), Math.floor((s%3600)/60), s%60].map(n=>String(n).padStart(2,'0')).join(':');
  }

  function log(msg, type) {
    const el = document.getElementById('log-entries');
    const r  = document.createElement('div');
    r.className = 'log-entry';
    r.innerHTML = `<span class="log-t">${ts()}</span><span class="log-m ${type||''}">${msg}</span>`;
    el.prepend(r);
    if (el.children.length > 60) el.lastChild.remove();
  }

  function val(k) { return parseInt(document.getElementById('sl-'+k).value); }

  // --- Network State ---
  function saveStateToCloud() {
    if (isDisplayMode) return; // Displays don't write
    const data = {};
    ['sys','drones','weapons','shields'].forEach(k => data[k] = val(k));
    set(powerRef, data);
  }

  function applyRemoteData(data) {
    if (!data) return;
    let changed = false;
    
    ['sys','drones','weapons','shields'].forEach(k => {
      const n = parseInt(data[k]);
      if (Number.isFinite(n)) { 
        const current = val(k);
        if (n !== current) {
          document.getElementById('sl-'+k).value = n; 
          if (isDisplayMode) {
            const s = statusOf(n), arrow = n < current ? '↓' : '↑';
            const tag = n === 0 ? ' — power cut' : '';
            log(`[REMOTE] ${arrow} ${LABELS[k]} ${s.label} — ${current}% → ${n}%${tag}.`, s.type);
          }
          prev[k] = n; 
          changed = true;
        }
      }
    });
    if (changed) updateAll();
  }

  // --- Listeners ---
  if (!isDisplayMode) {
    // Bind sliders for the DM
    ['sys', 'drones', 'weapons', 'shields'].forEach(k => {
      document.getElementById('sl-'+k).addEventListener('input', (e) => {
        let v = parseInt(e.target.value);
        const others = ['sys','drones','weapons','shields'].filter(x=>x!==k);
        const otherSum = others.reduce((a,x)=>a+val(x), 0);
        if (v + otherSum > 100) { v = Math.max(0, 100 - otherSum); }
        e.target.value = v;

        updateAll();

        const p = prev[k], lbl = LABELS[k];
        if (v !== p) {
          const s = statusOf(v), arrow = v < p ? '↓' : '↑';
          const tag = v === 0 ? ' — power cut. system down' : '';
          log(`${arrow} ${lbl} ${s.label} — ${p}% → ${v}%${tag}.`, s.type);
        }
        prev[k] = v;
        saveStateToCloud(); // Push to Firebase
      });
    });

    // Clear Log Button
    document.getElementById('btn-clear').addEventListener('click', () => {
      document.getElementById('log-entries').innerHTML = '';
      log('— log cleared.');
      set(clearLogRef, Date.now()); // Ping Firebase to clear remote displays
    });
  }

  // Listen for Cloud Data Changes (Both DM and Players)
  onValue(powerRef, (snapshot) => {
    applyRemoteData(snapshot.val());
  });

  // Listen for Cloud Clear Events
  onValue(clearLogRef, (snapshot) => {
    if (snapshot.val() && isDisplayMode) {
      document.getElementById('log-entries').innerHTML = '';
      log('— log cleared remotely.');
    }
  });

  // --- Core UI Update Loop ---
  function updateAll() {
    const vals = { sys:val('sys'), drones:val('drones'), weapons:val('weapons'), shields:val('shields') };
    const total = vals.sys + vals.drones + vals.weapons + vals.shields;
    const remaining = Math.max(0, 100 - total);

    ['sys','drones','weapons','shields'].forEach(k => {
      const v = vals[k];
      const pctEl = document.getElementById('pct-'+k);
      pctEl.textContent = v+'%';
      pctEl.className = 'sl-pct' + (v===0?' low': v<=2.5?' warn':'');

      const { c, pulse } = zoneColor(v);

      const fill = document.getElementById('ifill-'+k);
      fill.style.width = ((v/25)*100)+'%';
      fill.style.background = c;
      fill.style.boxShadow = v===0 ? 'none' : `0 0 7px ${c}bf, inset 0 0 4px rgba(235,255,240,0.45)`;
      fill.style.opacity = v===0 ? '0' : '';
      fill.classList.toggle('pulse', pulse && v>0);

      ['t-','b-'].forEach(pre => {
        const g = document.getElementById(pre+ZONE[k]);
        g.style.color = c;
        g.classList.toggle('pulse', pulse);
      });
      document.getElementById('seg-'+k).style.width = v+'%';
    });

    document.getElementById('seg-empty').style.width = remaining+'%';
    const tv = document.getElementById('total-val-disp');
    tv.textContent = total+'%';
    tv.className = 'total-val' + (total > 100 ? ' over' : '');

    const es = document.getElementById('engine-status');
    es.textContent = statusOf(vals.sys).label;
    es.style.color = zoneColor(vals.sys).c;
  }

  updateAll();
  log(isDisplayMode ? '▸ awaiting remote connection...' : '▸ ...connected' : '▸ power grid online. establishing cloud sync...');
</script>
</body>
</html>
