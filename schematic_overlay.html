<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ship Power Schematic — Live Overlays</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:#040d04; font-family:monospace; color:#4ade80; display:flex; justify-content:center; padding:20px; }
  .panel { width:100%; max-width:1100px; }
  .stage { position:relative; width:100%; border:1px solid #1e4d1e; border-radius:6px; overflow:hidden; }
  .stage img { display:block; width:100%; }
  .ov { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
  .tint { mix-blend-mode:color; }
  .bloom { mix-blend-mode:screen; filter:blur(3px); opacity:.6; }
  .zone { transition:color .3s ease; }
  .tint .zone *, .tint-svg .zone * { fill:currentColor; stroke:none; }
  .tint-svg .zone * { fill:currentColor; stroke:none; }
  .bloom-svg .zone * { fill:none; stroke:currentColor; stroke-width:6; }
  @keyframes pz { 0%,100%{opacity:1} 50%{opacity:.25} }
  .zone.pulse { animation:pz 1s ease-in-out infinite; }
  .ctrl { margin-top:14px; display:grid; grid-template-columns:1fr 1fr; gap:12px 20px; }
  .blk { display:flex; flex-direction:column; gap:5px; }
  .bh { display:flex; justify-content:space-between; align-items:center; }
  .bn { font-size:11px; letter-spacing:2px; color:#5f9e7a; }
  .bp { font-size:15px; font-weight:700; }
  input[type=range] { width:100%; accent-color:#4ade80; cursor:pointer; }
  .leg { display:flex; gap:16px; justify-content:center; font-size:11px; color:#5f9e7a; margin-top:12px; }
  .leg span { display:flex; align-items:center; gap:5px; }
  .dot { width:10px; height:10px; border-radius:50%; }
</style>
</head>
<body>
<div class="panel">
  <div class="stage">
    <img src="ShipTemplate.png" alt="Ship schematic">
    <svg class="ov bloom bloom-svg" viewBox="0 0 1538 688" preserveAspectRatio="none">
    <g id="b-eng" class="zone" style="color:#4ade80">
      <rect x="355" y="38" width="175" height="79" rx="40"/>
      <rect x="580" y="40" width="172" height="114" rx="46"/>
      <rect x="355" y="239" width="175" height="79" rx="40"/>
      <rect x="580" y="200" width="172" height="114" rx="46"/>
      <rect x="372" y="456" width="174" height="106" rx="50"/>
      <circle cx="888" cy="509" r="30"/>
      <circle cx="1040" cy="509" r="30"/>
    </g>
    <g id="b-drn" class="zone" style="color:#4ade80">
      <rect x="355" y="114" width="201" height="121" rx="12"/>
    </g>
    <g id="b-wpn" class="zone" style="color:#4ade80">
      <rect x="532" y="388" width="80" height="52" rx="4"/>
      <rect x="570" y="352" width="12" height="40" rx="2"/>
      <rect x="528" y="420" width="96" height="32" rx="3"/>
      <ellipse cx="318.5" cy="550" rx="33.5" ry="24"/>
      <ellipse cx="627.5" cy="614" rx="62.5" ry="42"/>
      <rect x="595" y="538" width="56" height="22" rx="3"/>
      <rect x="956" y="398" width="33" height="36" rx="4"/>
      <rect x="966" y="360" width="14" height="38" rx="2"/>
    </g>
    <g id="b-shd" class="zone" style="color:#4ade80">
      <polygon points="968,479 994,494.5 994,525.5 968,541 942,525.5 942,494.5"/>
    </g>
    </svg>
    <svg class="ov tint tint-svg" viewBox="0 0 1538 688" preserveAspectRatio="none">
    <g id="t-eng" class="zone" style="color:#4ade80">
      <rect x="355" y="38" width="175" height="79" rx="40"/>
      <rect x="580" y="40" width="172" height="114" rx="46"/>
      <rect x="355" y="239" width="175" height="79" rx="40"/>
      <rect x="580" y="200" width="172" height="114" rx="46"/>
      <rect x="372" y="456" width="174" height="106" rx="50"/>
      <circle cx="888" cy="509" r="30"/>
      <circle cx="1040" cy="509" r="30"/>
    </g>
    <g id="t-drn" class="zone" style="color:#4ade80">
      <rect x="355" y="114" width="201" height="121" rx="12"/>
    </g>
    <g id="t-wpn" class="zone" style="color:#4ade80">
      <rect x="532" y="388" width="80" height="52" rx="4"/>
      <rect x="570" y="352" width="12" height="40" rx="2"/>
      <rect x="528" y="420" width="96" height="32" rx="3"/>
      <ellipse cx="318.5" cy="550" rx="33.5" ry="24"/>
      <ellipse cx="627.5" cy="614" rx="62.5" ry="42"/>
      <rect x="595" y="538" width="56" height="22" rx="3"/>
      <rect x="956" y="398" width="33" height="36" rx="4"/>
      <rect x="966" y="360" width="14" height="38" rx="2"/>
    </g>
    <g id="t-shd" class="zone" style="color:#4ade80">
      <polygon points="968,479 994,494.5 994,525.5 968,541 942,525.5 942,494.5"/>
    </g>
    </svg>
  </div>

  <div class="ctrl">
    <div class="blk"><div class="bh"><span class="bn">ENGINES</span><span class="bp" id="p-sys" style="color:#4ade80">25%</span></div>
      <input type="range" min="0" max="25" step="1" value="25" id="s-sys" oninput="onSlide('sys',this.value)"></div>
    <div class="blk"><div class="bh"><span class="bn">DRONES</span><span class="bp" id="p-drn" style="color:#4ade80">25%</span></div>
      <input type="range" min="0" max="25" step="1" value="25" id="s-drn" oninput="onSlide('drn',this.value)"></div>
    <div class="blk"><div class="bh"><span class="bn">WEAPONS</span><span class="bp" id="p-wpn" style="color:#4ade80">25%</span></div>
      <input type="range" min="0" max="25" step="1" value="25" id="s-wpn" oninput="onSlide('wpn',this.value)"></div>
    <div class="blk"><div class="bh"><span class="bn">SHIELDS</span><span class="bp" id="p-shd" style="color:#4ade80">25%</span></div>
      <input type="range" min="0" max="25" step="1" value="25" id="s-shd" oninput="onSlide('shd',this.value)"></div>
  </div>

  <div class="leg">
    <span><span class="dot" style="background:#ef4444"></span>offline</span>
    <span><span class="dot" style="background:#f97316"></span>low</span>
    <span><span class="dot" style="background:#eab308"></span>partial</span>
    <span><span class="dot" style="background:#4ade80"></span>full</span>
  </div>
</div>

<script>
  const KEYS=['sys','drn','wpn','shd'];
  const SUF ={sys:'eng',drn:'drn',wpn:'wpn',shd:'shd'};
  function val(k){ return parseInt(document.getElementById('s-'+k).value); }
  function zoneColor(v){
    if(v===0) return {c:'#ef4444',pulse:true};
    const t=v/25; return {c:`hsl(${t*120},85%,55%)`,pulse:false};
  }
  function onSlide(key,raw){
    let v=parseInt(raw);
    const other=KEYS.filter(k=>k!==key).reduce((a,k)=>a+val(k),0);
    if(v+other>100){ v=Math.max(0,100-other); }
    document.getElementById('s-'+key).value=v;
    paint(key,v);
  }
  function paint(key,v){
    const {c,pulse}=zoneColor(v);
    ['t-','b-'].forEach(pre=>{
      const g=document.getElementById(pre+SUF[key]);
      g.style.color=c; g.classList.toggle('pulse',pulse);
    });
    const p=document.getElementById('p-'+key);
    p.textContent=v+'%'; p.style.color=c;
  }
  KEYS.forEach(k=>paint(k,val(k)));
</script>
</body>
</html>
