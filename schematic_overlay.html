<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ship Power Schematic — Live Overlays</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:#040d04; font-family:monospace; color:#4ade80; display:flex; justify-content:center; padding:20px; }
  .panel { width:100%; max-width:1100px; }
  .stage { position:relative; width:100%; border:1px solid #1e4d1e; border-radius:6px; overflow:hidden; }
  .stage img { display:block; width:100%; }
  .ov { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
  .tint { mix-blend-mode:color; }
  .bloom { mix-blend-mode:screen; filter:blur(3px); opacity:.6; }
  .zone { transition:color .3s ease; }
  .tint .zone *, .tint-svg .zone * { fill:currentColor; stroke:none; }
  .tint-svg .zone * { fill:currentColor; stroke:none; }
  .bloom-svg .zone * { fill:none; stroke:currentColor; stroke-width:6; }
  @keyframes pz { 0%,100%{opacity:1} 50%{opacity:.25} }
  .zone.pulse { animation:pz 1s ease-in-out infinite; }
  .ctrl { margin-top:14px; display:grid; grid-template-columns:1fr 1fr; gap:12px 20px; }
  .blk { display:flex; flex-direction:column; gap:5px; }
  .bh { display:flex; justify-content:space-between; align-items:center; }
  .bn { font-size:11px; letter-spacing:2px; color:#5f9e7a; }
  .bp { font-size:15px; font-weight:700; }
  input[type=range] { width:100%; accent-color:#4ade80; cursor:pointer; }
  .leg { display:flex; gap:16px; justify-content:center; font-size:11px; color:#5f9e7a; margin-top:12px; }
  .leg span { display:flex; align-items:center; gap:5px; }
  .dot { width:10px; height:10px; border-radius:50%; }
</style>

<script>
  const KEYS=['sys','drn','wpn','shd'];
  const SUF ={sys:'eng',drn:'drn',wpn:'wpn',shd:'shd'};
  function val(k){ return parseInt(document.getElementById('s-'+k).value); }
  function zoneColor(v){
    if(v===0) return {c:'#ef4444',pulse:true};
    const t=v/25; return {c:`hsl(${t*120},85%,55%)`,pulse:false};
  }
  function onSlide(key,raw){
    let v=parseInt(raw);
    const other=KEYS.filter(k=>k!==key).reduce((a,k)=>a+val(k),0);
    if(v+other>100){ v=Math.max(0,100-other); }
    document.getElementById('s-'+key).value=v;
    paint(key,v);
  }
  function paint(key,v){
    const {c,pulse}=zoneColor(v);
    ['t-','b-'].forEach(pre=>{
      const g=document.getElementById(pre+SUF[key]);
      g.style.color=c; g.classList.toggle('pulse',pulse);
    });
    const p=document.getElementById('p-'+key);
    p.textContent=v+'%'; p.style.color=c;
  }
  KEYS.forEach(k=>paint(k,val(k)));
</script>
