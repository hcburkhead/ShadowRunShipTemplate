<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadowrun-Ship-Demo-V2</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: #020805; font-family: monospace; color: #4ade80; }
  #app { position: fixed; inset: 0; }
  /* deep green projection backdrop — matches the dashboard demo */
  #app::before { content:""; position:absolute; inset:0; z-index:0;
    background: radial-gradient(120% 90% at 50% 38%, #0b2a16 0%, #06140a 45%, #020805 100%); }
  canvas { position: relative; z-index: 1; display: block; }

  /* hologram FX overlays */
  .fx { position: absolute; inset: 0; pointer-events: none; z-index: 5; }
  .scanlines { background: repeating-linear-gradient(0deg, rgba(0,0,0,0) 0 2px, rgba(0,40,30,0.25) 2px 3px); mix-blend-mode: multiply; opacity: .55; }
  .sweep { background: linear-gradient(0deg, transparent 0%, rgba(74,222,128,0.06) 48%, rgba(74,222,128,0.12) 50%, rgba(74,222,128,0.06) 52%, transparent 100%);
           height: 220px; top: -220px; animation: sweep 6s linear infinite; }
  @keyframes sweep { 0%{ transform: translateY(0); } 100%{ transform: translateY(120vh); } }
  .vignette { background: radial-gradient(120% 100% at 50% 50%, transparent 55%, rgba(0,0,0,0.55) 100%); }
  .flicker { background: rgba(80,255,200,0.025); animation: flick 5s steps(60) infinite; }
  @keyframes flick { 0%,100%{opacity:.5} 7%{opacity:.9} 9%{opacity:.4} 40%{opacity:.7} 41%{opacity:1} 60%{opacity:.55} 95%{opacity:.8} }

  /* HUD */
  .hud { position: absolute; z-index: 10; color: #4ade80; letter-spacing: 2px; text-shadow: 0 0 8px rgba(74,222,128,.6); pointer-events: none; }
  #hud-tl { top: 18px; left: 20px; }
  #hud-tl .t1 { font-size: 13px; color: #bef9d2; }
  #hud-tl .t2 { font-size: 10px; color: #2d6a2d; margin-top: 3px; }
  #hud-tr { top: 18px; right: 20px; text-align: right; font-size: 10px; color: #4ade80; }
  #hud-tr .live { color: #4ade80; }
  #hud-tr .live .dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:#4ade80; margin-right:6px; box-shadow:0 0 8px #4ade80; animation: blink 1.4s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
  #hud-bl { bottom: 16px; left: 20px; font-size: 10px; color: #2d6a2d; }
  #hud-br { bottom: 16px; right: 20px; font-size: 10px; color: #2d6a2d; text-align: right; }
  .corner { position:absolute; z-index:10; width:26px; height:26px; border:1px solid rgba(74,222,128,.4); pointer-events:none; }
  .corner.tl { top:10px; left:10px; border-right:0; border-bottom:0; }
  .corner.tr { top:10px; right:10px; border-left:0; border-bottom:0; }
  .corner.bl { bottom:10px; left:10px; border-right:0; border-top:0; }
  .corner.br { bottom:10px; right:10px; border-left:0; border-top:0; }
  #err { position:absolute; inset:0; z-index:20; display:none; align-items:center; justify-content:center; text-align:center; color:#ff6b6b; font-size:13px; padding:40px; }
</style>
</head>
<body>
<div id="app"></div>

<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>

<div class="fx scanlines"></div>
<div class="fx sweep"></div>
<div class="fx flicker"></div>
<div class="fx vignette"></div>

<div class="hud" id="hud-tl">
  <div class="t1">▸ HOLOGRAPHIC PROJECTION</div>
  <div class="t2">SHADOWRUN-DEMO-SHIP </div>
</div>
<div class="hud" id="hud-tr">
  <div class="live"><span class="dot"></span>PROJECTOR ONLINE</div>
  <div id="readout" style="margin-top:6px;color:#2d6a2d"></div>
</div>
<div class="hud" id="hud-bl">drag to rotate · scroll to zoom · double-click to reset</div>

<div id="err">WebGL unavailable — the holographic view needs a WebGL-capable browser.</div>

<script type="importmap">
{ "imports": { "three": "./vendor/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from './vendor/OrbitControls.js';
import { GLTFLoader } from './vendor/GLTFLoader.js';
import { FBXLoader } from './vendor/FBXLoader.js';

const GREEN = 0x4ade80, DIM = 0x1c9c52, GLINT = 0xbef9d2;
const app = document.getElementById('app');

let renderer;
try {
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
} catch (e) { document.getElementById('err').style.display = 'flex'; throw e; }
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x000000, 0);
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x031208, 0.0016);

const camera = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, 1, 4000);
camera.position.set(120, 70, 130);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 2, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.enablePan = false;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.6;
controls.minDistance = 90;
controls.maxDistance = 620;
controls.maxPolarAngle = Math.PI * 0.52;
renderer.domElement.addEventListener('dblclick', () => {
  camera.position.set(120, 70, 130); controls.target.set(0, 2, 0);
});
if (new URLSearchParams(location.search).has('dev')) window.__holo = { camera, controls };

// ---------- wireframe helpers ----------
function wire(geom, { color = GREEN, opacity = 0.92, mesh = false, threshold = 24 } = {}) {
  const edges = mesh ? new THREE.WireframeGeometry(geom)
                     : new THREE.EdgesGeometry(geom, threshold);
  const m = new THREE.LineBasicMaterial({ color, transparent: true, opacity,
              blending: THREE.AdditiveBlending, depthWrite: false });
  geom.dispose();
  return new THREE.LineSegments(edges, m);
}
function add(parent, geom, opts = {}) {
  const l = wire(geom, opts);
  if (opts.pos) l.position.set(...opts.pos);
  if (opts.rot) l.rotation.set(...opts.rot);
  if (opts.scl) Array.isArray(opts.scl) ? l.scale.set(...opts.scl) : l.scale.setScalar(opts.scl);
  parent.add(l);
  return l;
}
// build a small line-segment set from explicit point pairs
function segs(pairs, color = DIM, opacity = 0.6) {
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pairs.flat(), 3));
  return new THREE.LineSegments(g, new THREE.LineBasicMaterial({ color, transparent: true,
            opacity, blending: THREE.AdditiveBlending, depthWrite: false }));
}

// ---------- the ship: S.H.I.E.L.D. Helicarrier (procedural wireframe) ----------
const ship = new THREE.Group();
scene.add(ship);

// loft a tapered hull between a top outline (yTop) and a scaled bottom (yBot)
function loft(top, yTop, bottom, yBot, color, opacity) {
  const p = [];
  const ring = (pts, y) => { for (let i = 0; i < pts.length; i++) {
    const a = pts[i], b = pts[(i + 1) % pts.length];
    p.push([a[0], y, a[1]], [b[0], y, b[1]]); } };
  ring(top, yTop); ring(bottom, yBot);
  for (let i = 0; i < top.length; i++)
    p.push([top[i][0], yTop, top[i][1]], [bottom[i][0], yBot, bottom[i][1]]);
  return segs(p, color, opacity);
}

// HULL — a long, low, faceted dart: long pointed prow, tapering pointed stern
const HALF  = [ [150,0],[122,3.5],[92,8],[58,12.5],[22,15.5],[-18,15.5],[-54,13.5],[-86,9.5],[-110,4.5],[-120,0] ];
const DECK  = HALF.concat(HALF.slice(1, -1).reverse().map(([x, z]) => [x, -z]));
const KNUCK = DECK.map(([x, z]) => [x * 0.97, z * 0.70]);   // chine
const KEEL  = DECK.map(([x, z]) => [x * 0.80, z * 0.34]);   // shallow faceted belly

ship.add(loft(DECK,  1.5, KNUCK, -6,  GREEN, 0.55));  // upper hull side
ship.add(loft(KNUCK, -6,  KEEL,  -16, GREEN, 0.45));  // belly → keel
ship.add(loft(DECK,  3,   DECK,   1.5, GREEN, 0.7));  // deck-edge lip
// a few belly facet diagonals (low-poly look)
(function facets() {
  const f = [];
  for (let i = 2; i < KNUCK.length - 2; i += 2)
    f.push([KNUCK[i][0], -6, KNUCK[i][1]], [KEEL[(i+1) % KEEL.length][0], -16, KEEL[(i+1) % KEEL.length][1]]);
  ship.add(segs(f, DIM, 0.35));
})();

// FLIGHT DECK markings — long centerline + a few panel ticks
(function deck() {
  const y = 3.3, d = [];
  for (let x = -100; x <= 130; x += 12) d.push([x, y, 0], [x + 6, y, 0]);
  for (let x = -90; x <= 70; x += 20) { d.push([x, y, -12], [x, y, -7], [x, y, 7], [x, y, 12]); }
  ship.add(segs(d, DIM, 0.45));
})();

// 4 LIFT-FAN PODS on big swept outboard sponsons (forward pair + aft pair)
const fans = [];
function fanPod(x, z, yaw) {
  const g = new THREE.Group();
  const side = Math.sign(z), R = 20;
  // faceted sponson plate (thin), swept via yaw; tapers inboard toward the hull
  add(g, new THREE.BoxGeometry(54, 4, 40), { color: GREEN, opacity: 0.5 });
  g.add(segs([ [27,2,20],[27,2,-20], [-27,2,20],[-27,2,-20],
               [10,2,-side*20],[2,2,-side*34], [-10,2,-side*20],[-18,2,-side*30] ], GREEN, 0.6)); // outboard + inboard facets
  // ducted housing — open cylinder rims + top lip + inner ring
  add(g, new THREE.CylinderGeometry(R, R, 9, 52, 1, true), { color: GREEN, opacity: 0.85 });
  add(g, new THREE.TorusGeometry(R, 1.2, 6, 54), { color: GREEN, opacity: 0.95, mesh: true, pos: [0, 4.5, 0], rot: [Math.PI/2, 0, 0] });
  add(g, new THREE.TorusGeometry(R - 3.5, 0.7, 5, 46), { color: DIM, opacity: 0.45, mesh: true, pos: [0, 4.5, 0], rot: [Math.PI/2, 0, 0] });
  // hub + radial blades (spun in animate)
  const fan = new THREE.Group(); fan.position.y = 0.8;
  add(fan, new THREE.CylinderGeometry(3.2, 3.8, 5, 12), { color: GREEN, opacity: 0.9 });
  const bl = [];
  for (let i = 0; i < 18; i++) { const a = (i / 18) * Math.PI * 2;
    bl.push([Math.cos(a)*3.6, 0, Math.sin(a)*3.6], [Math.cos(a)*(R-1.5), 1.3, Math.sin(a)*(R-1.5)]); }
  fan.add(segs(bl, GLINT, 0.5));
  g.add(fan); fans.push(fan);
  g.position.set(x, -1, z); g.rotation.y = yaw;
  ship.add(g);
}
fanPod( 72,  48, -0.30); fanPod( 72, -48,  0.30);   // forward pair, swept
fanPod(-30,  48,  0.24); fanPod(-30, -48, -0.24);   // aft pair, swept

// ISLAND — tall forward-leaning triangular tower with a long needle mast
(function island() {
  const g = new THREE.Group();
  const tiers = [ [24,6,15,0,0], [18,6,12,6,3], [13,6,10,12,5], [8,7,8,18,7] ];  // w,h,d,y,xShift (peak forward)
  for (const [w, h, d, y, xs] of tiers) add(g, new THREE.BoxGeometry(w, h, d), { color: GREEN, opacity: 0.85, pos: [xs, y, 0] });
  add(g, new THREE.BoxGeometry(24.4, 2.4, 15.4), { color: GLINT, opacity: 0.55, pos: [0, 2.5, 0] }); // bridge windows
  add(g, new THREE.SphereGeometry(3.2, 10, 7), { color: GREEN, opacity: 0.6, mesh: true, pos: [9, 24, 0] }); // dome
  // long needle mast rising from the forward peak
  add(g, new THREE.CylinderGeometry(0.15, 1.0, 26, 5), { color: GREEN, opacity: 0.9, pos: [9, 33, 0] });
  g.add(segs([ [4,42,0],[14,42,0], [6,37,0],[12,37,0], [9,20,0],[9,46,0] ], GLINT, 0.55)); // yardarms + tip
  g.position.set(74, 1.5, 5);
  ship.add(g);
})();

// row of small comms antennae along the deck behind the island
(function antennae() {
  const g = new THREE.Group();
  for (let x = 40; x >= -8; x -= 7)
    add(g, new THREE.BoxGeometry(2, 4, 2), { color: DIM, opacity: 0.6, pos: [x, 5, (x % 14 ? 1 : -1)] });
  ship.add(g);
})();

// STERN exhaust nozzles at the tapered tail
for (const z of [-7, 0, 7])
  add(ship, new THREE.CylinderGeometry(2.4, 3, 8, 10, 1, true), { color: GREEN, opacity: 0.8, pos: [-122, -2, z], rot: [0, 0, Math.PI/2] });

// parked jets on deck (swept delta silhouettes)
function jet(x, z, rot) {
  const j = new THREE.Group();
  add(j, new THREE.BoxGeometry(13, 1.6, 2.4), { color: GLINT, opacity: 0.45 });
  add(j, new THREE.ConeGeometry(1.8, 5, 4), { color: GLINT, opacity: 0.5, pos: [7, 0, 0], rot: [0, 0, -Math.PI/2] });
  j.add(segs([ [-1,0,0],[-5,0,9], [-1,0,0],[-5,0,-9], [-5,0,9],[-8,0,7], [-5,0,-9],[-8,0,-7] ], GLINT, 0.4));
  j.position.set(x, 4.5, z); j.rotation.y = rot; ship.add(j);
}
jet(108, 6, 0.15); jet(100, -7, -0.1); jet(92, 8, 0.12); jet(-58, -6, 3.0);

ship.scale.setScalar(0.62);

// ---------- real model loader (vendor/helicarrier.glb) ----------
// If a real .glb is present it replaces the procedural ship, re-rendered as
// green wireframe edges (no faces). If it's missing/fails, we keep the
// procedural Helicarrier above as a fallback.
const Q = new URLSearchParams(location.search);
const MODEL_URL = Q.get('model') || 'Helicarrier.fbx';
const WIRE_FULL = Q.get('wire') === 'full';   // every triangle edge vs. clean feature edges
const ROT = [ +(Q.get('rx')||0), +(Q.get('ry')||0), +(Q.get('rz')||0) ].map(v => v * Math.PI/180);

function wireframeOf(root, { color = GREEN, opacity = 0.85, full = false, threshold = 24 } = {}) {
  root.updateWorldMatrix(true, true);
  const out = new THREE.Group();
  root.traverse(o => {
    if (o.isMesh && o.geometry) {
      const eg = full ? new THREE.WireframeGeometry(o.geometry)
                      : new THREE.EdgesGeometry(o.geometry, threshold);
      const ls = new THREE.LineSegments(eg, new THREE.LineBasicMaterial({
        color, transparent: true, opacity, blending: THREE.AdditiveBlending, depthWrite: false }));
      o.updateWorldMatrix(true, false);
      ls.applyMatrix4(o.matrixWorld);     // bake transforms into a flat group
      out.add(ls);
    }
  });
  return out;
}
function fitToFrame(g, target = 165) {
  const box = new THREE.Box3().setFromObject(g);
  const size = new THREE.Vector3(), center = new THREE.Vector3();
  box.getSize(size); box.getCenter(center);
  g.position.sub(center);                                // recenter at origin
  const wrap = new THREE.Group();
  wrap.add(g);
  wrap.scale.setScalar(target / Math.max(size.x, size.y, size.z));
  wrap.rotation.set(ROT[0], ROT[1], ROT[2]);
  return wrap;
}

const ext = MODEL_URL.split('?')[0].split('.').pop().toLowerCase();
const loader = ext === 'fbx' ? new FBXLoader() : new GLTFLoader();
loader.load(MODEL_URL, (res) => {
  // success → drop the procedural parts, show the real model as wireframe
  const root = res.scene || res;          // glTF returns { scene }, FBX returns the object
  for (const c of [...ship.children]) ship.remove(c);
  fans.length = 0;
  const model = fitToFrame(wireframeOf(root, { full: WIRE_FULL }));
  ship.add(model);
  ship.scale.setScalar(1);
  document.getElementById('hud-tl').querySelector('.t2').textContent =
    'S.H.I.E.L.D. HELICARRIER  |  3D MODEL · WIREFRAME';
}, undefined, (err) => {
  console.warn('[holo] no model at ' + MODEL_URL + ' — using procedural fallback.', err);
});

// ---------- holographic projector base (static, ship hovers above) ----------
const base = new THREE.Group();
base.position.y = -34;
scene.add(base);
add(base, new THREE.TorusGeometry(118, 0.8, 6, 96), { color: GREEN, opacity: 0.8, mesh: true, rot: [Math.PI/2, 0, 0] });
add(base, new THREE.TorusGeometry(92, 0.5, 6, 80), { color: DIM, opacity: 0.45, mesh: true, rot: [Math.PI/2, 0, 0] });
const grid = new THREE.PolarGridHelper(118, 16, 8, 96, 0x1c9c52, 0x0d3a22);
grid.material.transparent = true; grid.material.opacity = 0.35; grid.material.blending = THREE.AdditiveBlending; grid.material.depthWrite = false;
base.add(grid);
// faint projection cone from base up toward the ship
const cone = add(base, new THREE.CylinderGeometry(118, 16, 56, 48, 1, true),
                 { color: 0x0d3320, opacity: 0.16, mesh: true, pos: [0, 28, 0] });

// ---------- animate ----------
const ro = document.getElementById('readout');
const clock = new THREE.Clock();
let t = 0;
function tick() {
  const dt = clock.getDelta(); t += dt;
  ship.position.y = 6 + Math.sin(t * 0.8) * 2.2;        // gentle hover bob
  base.rotation.y -= dt * 0.05;                          // slow base spin (counter)
  for (const f of fans) f.rotation.y += dt * 3;
  controls.update();
  renderer.render(scene, camera);
  const az = (controls.getAzimuthalAngle() * 180 / Math.PI + 360) % 360;
  ro.textContent = `AZ ${az.toFixed(0).padStart(3,'0')}°  ·  RNG ${camera.position.length().toFixed(0)}`;
  requestAnimationFrame(tick);
}
tick();

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
