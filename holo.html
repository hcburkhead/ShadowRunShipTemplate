<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holographic Projection — Ship</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: #02060a; font-family: monospace; color: #7df9c0; }
  #app { position: fixed; inset: 0; }
  /* deep teal projection backdrop */
  #app::before { content:""; position:absolute; inset:0; z-index:0;
    background: radial-gradient(120% 90% at 50% 38%, #06231f 0%, #04141a 45%, #01060a 100%); }
  canvas { position: relative; z-index: 1; display: block; }

  /* hologram FX overlays */
  .fx { position: absolute; inset: 0; pointer-events: none; z-index: 5; }
  .scanlines { background: repeating-linear-gradient(0deg, rgba(0,0,0,0) 0 2px, rgba(0,40,30,0.25) 2px 3px); mix-blend-mode: multiply; opacity: .55; }
  .sweep { background: linear-gradient(0deg, transparent 0%, rgba(110,243,255,0.06) 48%, rgba(110,243,255,0.10) 50%, rgba(110,243,255,0.06) 52%, transparent 100%);
           height: 220px; top: -220px; animation: sweep 6s linear infinite; }
  @keyframes sweep { 0%{ transform: translateY(0); } 100%{ transform: translateY(120vh); } }
  .vignette { background: radial-gradient(120% 100% at 50% 50%, transparent 55%, rgba(0,0,0,0.55) 100%); }
  .flicker { background: rgba(80,255,200,0.025); animation: flick 5s steps(60) infinite; }
  @keyframes flick { 0%,100%{opacity:.5} 7%{opacity:.9} 9%{opacity:.4} 40%{opacity:.7} 41%{opacity:1} 60%{opacity:.55} 95%{opacity:.8} }

  /* HUD */
  .hud { position: absolute; z-index: 10; color: #6df3ff; letter-spacing: 2px; text-shadow: 0 0 8px rgba(80,255,200,.6); pointer-events: none; }
  #hud-tl { top: 18px; left: 20px; }
  #hud-tl .t1 { font-size: 13px; color: #8effca; }
  #hud-tl .t2 { font-size: 10px; color: #3f9e8a; margin-top: 3px; }
  #hud-tr { top: 18px; right: 20px; text-align: right; font-size: 10px; color: #6df3ff; }
  #hud-tr .live { color: #53ffa8; }
  #hud-tr .live .dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:#53ffa8; margin-right:6px; box-shadow:0 0 8px #53ffa8; animation: blink 1.4s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
  #hud-bl { bottom: 16px; left: 20px; font-size: 10px; color: #3f9e8a; }
  #hud-br { bottom: 16px; right: 20px; font-size: 10px; color: #3f9e8a; text-align: right; }
  .corner { position:absolute; z-index:10; width:26px; height:26px; border:1px solid rgba(110,243,255,.4); pointer-events:none; }
  .corner.tl { top:10px; left:10px; border-right:0; border-bottom:0; }
  .corner.tr { top:10px; right:10px; border-left:0; border-bottom:0; }
  .corner.bl { bottom:10px; left:10px; border-right:0; border-top:0; }
  .corner.br { bottom:10px; right:10px; border-left:0; border-top:0; }
  #err { position:absolute; inset:0; z-index:20; display:none; align-items:center; justify-content:center; text-align:center; color:#ff6b6b; font-size:13px; padding:40px; }
</style>
</head>
<body>
<div id="app"></div>

<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>

<div class="fx scanlines"></div>
<div class="fx sweep"></div>
<div class="fx flicker"></div>
<div class="fx vignette"></div>

<div class="hud" id="hud-tl">
  <div class="t1">▸ HOLOGRAPHIC PROJECTION</div>
  <div class="t2">S.H.I.E.L.D. HELICARRIER &nbsp;|&nbsp; WIREFRAME MODE</div>
</div>
<div class="hud" id="hud-tr">
  <div class="live"><span class="dot"></span>PROJECTOR ONLINE</div>
  <div id="readout" style="margin-top:6px;color:#3f9e8a"></div>
</div>
<div class="hud" id="hud-bl">drag to rotate · scroll to zoom · double-click to reset</div>
<div class="hud" id="hud-br">3D MESH · EDGES ONLY · NO FACES</div>

<div id="err">WebGL unavailable — the holographic view needs a WebGL-capable browser.</div>

<script type="importmap">
{ "imports": { "three": "./vendor/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from './vendor/OrbitControls.js';

const GREEN = 0x53ffa8, DIM = 0x2ad79a, CYAN = 0x6df3ff;
const app = document.getElementById('app');

let renderer;
try {
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
} catch (e) { document.getElementById('err').style.display = 'flex'; throw e; }
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x000000, 0);
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x02161a, 0.0016);

const camera = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, 1, 4000);
camera.position.set(110, 72, 120);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 2, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.enablePan = false;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.6;
controls.minDistance = 90;
controls.maxDistance = 620;
controls.maxPolarAngle = Math.PI * 0.52;
renderer.domElement.addEventListener('dblclick', () => {
  camera.position.set(110, 72, 120); controls.target.set(0, 2, 0);
});
if (new URLSearchParams(location.search).has('dev')) window.__holo = { camera, controls };

// ---------- wireframe helpers ----------
function wire(geom, { color = GREEN, opacity = 0.92, mesh = false, threshold = 24 } = {}) {
  const edges = mesh ? new THREE.WireframeGeometry(geom)
                     : new THREE.EdgesGeometry(geom, threshold);
  const m = new THREE.LineBasicMaterial({ color, transparent: true, opacity,
              blending: THREE.AdditiveBlending, depthWrite: false });
  geom.dispose();
  return new THREE.LineSegments(edges, m);
}
function add(parent, geom, opts = {}) {
  const l = wire(geom, opts);
  if (opts.pos) l.position.set(...opts.pos);
  if (opts.rot) l.rotation.set(...opts.rot);
  if (opts.scl) Array.isArray(opts.scl) ? l.scale.set(...opts.scl) : l.scale.setScalar(opts.scl);
  parent.add(l);
  return l;
}
// build a small line-segment set from explicit point pairs
function segs(pairs, color = DIM, opacity = 0.6) {
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pairs.flat(), 3));
  return new THREE.LineSegments(g, new THREE.LineBasicMaterial({ color, transparent: true,
            opacity, blending: THREE.AdditiveBlending, depthWrite: false }));
}

// ---------- the ship: S.H.I.E.L.D. Helicarrier (procedural wireframe) ----------
const ship = new THREE.Group();
scene.add(ship);

// loft a tapered hull between a top outline (yTop) and a scaled bottom (yBot)
function loft(top, yTop, bottom, yBot, color, opacity) {
  const p = [];
  const ring = (pts, y) => { for (let i = 0; i < pts.length; i++) {
    const a = pts[i], b = pts[(i + 1) % pts.length];
    p.push([a[0], y, a[1]], [b[0], y, b[1]]); } };
  ring(top, yTop); ring(bottom, yBot);
  for (let i = 0; i < top.length; i++)
    p.push([top[i][0], yTop, top[i][1]], [bottom[i][0], yBot, bottom[i][1]]);
  return segs(p, color, opacity);
}

// carrier flight-deck outline (starboard half, bow at +X) mirrored to a loop
const HALF = [ [96,0],[91,9],[82,16],[58,21],[12,23.5],[-46,23.5],[-82,21],[-92,12],[-97,0] ];
const DECK = HALF.concat(HALF.slice(1, -1).reverse().map(([x, z]) => [x, -z]));
const KEEL = DECK.map(([x, z]) => [x * 0.92, z * 0.5]);

// HULL — tapered body down to keel, plus the raised flight-deck lip
ship.add(loft(DECK, 1,  KEEL, -22, GREEN, 0.5));   // hull sides → keel
ship.add(loft(DECK, 4,  DECK,   1, GREEN, 0.7));   // deck-edge thickness

// FLIGHT DECK markings — runway centerline, canted strip, panel ticks, elevators
(function deck() {
  const y = 4.4, d = [];
  for (let x = -82; x <= 78; x += 12) d.push([x, y, 0], [x + 7, y, 0]);     // centerline dashes
  d.push([74, y, -3], [-60, y, -17], [72, y, 3], [-62, y, -11]);            // port canted strip
  d.push([80, y, 7], [-44, y, 15]);                                         // starboard take-off strip
  for (let x = -80; x <= 86; x += 16) { d.push([x, y, -21], [x, y, -15], [x, y, 15], [x, y, 21]); }
  const elev = (cx, cz, w, h) => { const x0 = cx-w/2, x1 = cx+w/2, z0 = cz-h/2, z1 = cz+h/2;
    d.push([x0,y,z0],[x1,y,z0], [x1,y,z0],[x1,y,z1], [x1,y,z1],[x0,y,z1], [x0,y,z1],[x0,y,z0]); };
  elev(42, 21, 14, 9); elev(-28, -21, 14, 9);                              // deck-edge elevators
  ship.add(segs(d, DIM, 0.5));
})();

// 4 LIFT-FAN PODS on outrigger sponsons (2 forward, 2 aft)
const fans = [];
function fanPod(x, z) {
  const g = new THREE.Group();
  const side = Math.sign(z), R = 19;
  // sponson platform bridging the hull edge out to the pod
  add(g, new THREE.BoxGeometry(42, 8, 28), { color: GREEN, opacity: 0.5, pos: [0, 0, -side * 8] });
  // ducted housing — open cylinder gives two clean rim circles, axis = Y (lift)
  add(g, new THREE.CylinderGeometry(R, R, 10, 48, 1, true), { color: GREEN, opacity: 0.85 });
  add(g, new THREE.TorusGeometry(R, 1.3, 6, 50), { color: GREEN, opacity: 0.95, mesh: true, pos: [0, 5, 0], rot: [Math.PI/2, 0, 0] });
  add(g, new THREE.TorusGeometry(R - 3, 0.7, 5, 44), { color: DIM, opacity: 0.45, mesh: true, pos: [0, 5, 0], rot: [Math.PI/2, 0, 0] });
  // hub + radial fan blades (spun in animate)
  const fan = new THREE.Group(); fan.position.y = 1;
  add(fan, new THREE.CylinderGeometry(3.4, 4, 6, 12), { color: GREEN, opacity: 0.9 });
  const bl = [];
  for (let i = 0; i < 16; i++) { const a = (i / 16) * Math.PI * 2;
    bl.push([Math.cos(a)*3.8, 0, Math.sin(a)*3.8], [Math.cos(a)*(R-1.5), 1.4, Math.sin(a)*(R-1.5)]); }
  fan.add(segs(bl, CYAN, 0.5));
  g.add(fan); fans.push(fan);
  g.position.set(x, -1, z);
  ship.add(g);
}
fanPod( 44,  40); fanPod( 44, -40);
fanPod(-50,  40); fanPod(-50, -40);

// ISLAND superstructure (starboard, forward of midships) + radar mast
(function island() {
  const g = new THREE.Group();
  const tiers = [ [30,8,12,0], [24,7,10,8], [16,7,9,15], [11,8,8,22] ];
  for (const [w, h, d, y] of tiers) add(g, new THREE.BoxGeometry(w, h, d), { color: GREEN, opacity: 0.85, pos: [0, y, 0] });
  add(g, new THREE.BoxGeometry(30.4, 2.4, 12.4), { color: CYAN, opacity: 0.55, pos: [0, 3.5, 0] }); // bridge windows
  add(g, new THREE.SphereGeometry(5, 12, 8), { color: GREEN, opacity: 0.65, mesh: true, pos: [4, 30, 0] }); // radar dome
  add(g, new THREE.CylinderGeometry(0.4, 1.1, 26, 6), { color: GREEN, opacity: 0.9, pos: [-9, 30, 0] });    // mast
  g.add(segs([[-13,34,0],[-5,34,0], [-12,40,0],[-6,40,0], [-9,17,0],[-9,46,0], [-9,45,-4],[-9,45,4]], CYAN, 0.6)); // yardarms
  g.position.set(22, 4, 14);
  ship.add(g);
})();

// STERN exhaust bank
for (const z of [-12, -4, 4, 12])
  add(ship, new THREE.CylinderGeometry(3, 4, 9, 12, 1, true), { color: GREEN, opacity: 0.8, pos: [-99, -3, z], rot: [0, 0, Math.PI/2] });

// parked quinjets on deck (delta silhouettes), for flavour
function jet(x, z, rot) {
  const j = new THREE.Group();
  add(j, new THREE.ConeGeometry(3, 12, 3), { color: CYAN, opacity: 0.55, rot: [Math.PI/2, 0, -Math.PI/2] });
  add(j, new THREE.BoxGeometry(17, 1.5, 2), { color: CYAN, opacity: 0.4 });
  j.position.set(x, 6, z); j.rotation.y = rot; ship.add(j);
}
jet(58, 12, 0.18); jet(34, -8, -0.12); jet(2, 16, 0.08); jet(-22, -13, 3.0);

ship.scale.setScalar(0.95);

// ---------- holographic projector base (static, ship hovers above) ----------
const base = new THREE.Group();
base.position.y = -34;
scene.add(base);
add(base, new THREE.TorusGeometry(118, 0.8, 6, 96), { color: CYAN, opacity: 0.8, mesh: true, rot: [Math.PI/2, 0, 0] });
add(base, new THREE.TorusGeometry(92, 0.5, 6, 80), { color: DIM, opacity: 0.45, mesh: true, rot: [Math.PI/2, 0, 0] });
const grid = new THREE.PolarGridHelper(118, 16, 8, 96, 0x1d6b58, 0x124034);
grid.material.transparent = true; grid.material.opacity = 0.35; grid.material.blending = THREE.AdditiveBlending; grid.material.depthWrite = false;
base.add(grid);
// faint projection cone from base up toward the ship
const cone = add(base, new THREE.CylinderGeometry(118, 16, 56, 48, 1, true),
                 { color: 0x0e3a33, opacity: 0.16, mesh: true, pos: [0, 28, 0] });

// ---------- animate ----------
const ro = document.getElementById('readout');
const clock = new THREE.Clock();
let t = 0;
function tick() {
  const dt = clock.getDelta(); t += dt;
  ship.position.y = 6 + Math.sin(t * 0.8) * 2.2;        // gentle hover bob
  base.rotation.y -= dt * 0.05;                          // slow base spin (counter)
  for (const f of fans) f.rotation.y += dt * 3;
  controls.update();
  renderer.render(scene, camera);
  const az = (controls.getAzimuthalAngle() * 180 / Math.PI + 360) % 360;
  ro.textContent = `AZ ${az.toFixed(0).padStart(3,'0')}°  ·  RNG ${camera.position.length().toFixed(0)}`;
  requestAnimationFrame(tick);
}
tick();

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
