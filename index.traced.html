<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ship Power Dashboard - Draw Tool</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #040d04; font-family: monospace; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 20px; user-select: none; }

    .outer { background: #061006; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; width: 100%; max-width: 1000px; border: 1px solid #1e4d1e; position: relative; }

    /* --- SCHEMATIC ROW --- */
    .schematic-row { display: flex; width: 100%; align-items: stretch; }
    .ship-wrap { flex: 1; position: relative; cursor: crosshair; }
    .ship-wrap img { width: 100%; height: auto; display: block; filter: brightness(0.9); pointer-events: none; } /* Disabled pointer on image to prevent drag-ghosting */
    .ship-wrap svg.ov { width: 100%; height: auto; display: block; pointer-events: auto; touch-action: none; } 

    /* --- LIVE SYSTEM OVERLAYS --- */
    .ov { position: absolute; inset: 0; width: 100%; height: 100%; }
    .tint { mix-blend-mode: color; pointer-events: none; }
    .bloom { mix-blend-mode: screen; filter: blur(0.7px); opacity: .38; }
    .zone { transition: color .3s ease; pointer-events: none; }
    .tint-svg .zone * { fill: currentColor; stroke: none; }
    .bloom-svg .zone * { fill: none; stroke: currentColor; stroke-width: 1.6; }
    @keyframes pz { 0%,100%{opacity:1} 50%{opacity:.25} }
    .zone.pulse { animation: pz 1s ease-in-out infinite; }

    /* --- INSET PROGRESS BARS --- */
    .bar-overlay { position: absolute; inset: 0; pointer-events: none; }
    .ibar { position: absolute; border-radius: 2px; overflow: hidden; background: rgba(8, 22, 8, 0.35); }
    .ibar-fill { height: 100%; width: 25%; border-radius: 2px; background: #4ade80;
                 box-shadow: 0 0 7px rgba(74, 222, 128, 0.75), inset 0 0 4px rgba(190, 255, 210, 0.5);
                 transition: width 0.25s ease, opacity 0.25s; }

    /* --- MAIN POWER PANEL --- */
    .power-panel { width: 220px; background: #061006; border-left: 1.5px solid #1e4d1e; display: flex; flex-direction: column; pointer-events: none; }
    .pp-title { background: #0a1e0a; border-bottom: 1.5px solid #1e4d1e; text-align: center; font-size: 10px; letter-spacing: 2px; color: #4ade80; padding: 8px 4px; font-weight: 500; }
    .pp-main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 10px; padding: 14px 16px; text-align: center; }
    .mp-label { font-size: 10px; letter-spacing: 2px; color: #2d6a2d; }
    .engine-status { font-size: 18px; font-weight: 600; letter-spacing: 3px; color: #4ade80; transition: color 0.2s; }
    .pp-top-bar-wrap { width: 100%; height: 22px; background: #0a1a0a; border: 1px solid #1e4d1e; border-radius: 2px; overflow: hidden; display: flex; }
    .seg { height: 100%; transition: width 0.25s; }
    .total-row { display: flex; flex-direction: column; gap: 2px; font-size: 9px; color: #2d6a2d; letter-spacing: 1px; }
    .total-val { font-size: 22px; font-weight: 600; color: #4ade80; letter-spacing: 1px; }
    .total-val.over { color: #ef4444; }

    /* --- SLIDERS --- */
    .sliders-row { background: #061006; border-top: 1.5px solid #1e4d1e; padding: 10px 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; }
    .sl-block { display: flex; flex-direction: column; gap: 3px; }
    .sl-header { display: flex; justify-content: space-between; align-items: center; }
    .sl-name { font-size: 9px; letter-spacing: 2px; color: #2d6a2d; }
    .sl-pct { font-size: 13px; font-weight: 500; color: #4ade80; transition: color 0.2s; }
    .sl-pct.low { color: #ef4444; }
    .sl-pct.warn { color: #f59e0b; }
    input[type=range] { width: 100%; accent-color: #4ade80; cursor: pointer; }

    /* --- LOG --- */
    .log-area { background: #040d04; border-top: 1.5px solid #1e4d1e; padding: 8px 12px; max-height: 160px; overflow-y: auto; display: flex; flex-direction: column; }
    .log-hdr { font-size: 9px; letter-spacing: 2px; color: #1e4d1e; margin-bottom: 4px; }
    .log-entry { font-size: 10px; line-height: 1.7; display: flex; gap: 8px; border-bottom: 0.5px solid #0a1e0a; }
    .log-t { color: #1e6b1e; min-width: 52px; }
    .log-m { color: #4ade80; }
    .log-m.drop { color: #ef4444; }
    .log-m.gain { color: #4ade80; }
    .log-m.warn { color: #f59e0b; }

    /* --- TRACER TOOL CSS --- */
    .tracer-panel { position: fixed; bottom: 20px; right: 20px; background: rgba(4, 13, 4, 0.95); border: 1px solid #0ea5e9; padding: 12px; border-radius: 6px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; width: 340px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    .tracer-title { color: #0ea5e9; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: space-between; }
    .tracer-title span { color: #a3a3a3; font-weight: normal; }
    
    .apply-row { display: flex; gap: 5px; }
    .apply-row select { flex: 1; background: #0a1a0a; color: #fff; border: 1px solid #1e4d1e; padding: 4px; font-family: monospace; font-size: 10px; border-radius: 2px; outline: none; }
    .apply-row button { flex: 1; background: #0ea5e9; color: #040d04; border: none; padding: 6px; cursor: pointer; font-family: monospace; font-size: 10px; border-radius: 2px; font-weight: bold; transition: opacity 0.2s; }
    .apply-row button:hover { opacity: 0.8; }

    #tracer-output { width: 100%; background: #0a1a0a; color: #fff; border: 1px solid #1e4d1e; font-family: monospace; font-size: 10px; padding: 6px; resize: vertical; min-height: 50px; }
    
    .tracer-controls { display: flex; gap: 5px; }
    .tracer-controls button { flex: 1; background: #1e4d1e; color: #4ade80; border: none; padding: 6px; cursor: pointer; font-family: monospace; font-size: 10px; border-radius: 2px; transition: background 0.2s; }
    .tracer-controls button:hover { background: #2d6a2d; }
    .tracer-controls button.clear-btn { color: #ef4444; }
    
    /* Tracer SVG Elements */
    .tracer-shape { fill: rgba(14, 165, 233, 0.25); stroke: #0ea5e9; stroke-width: 2; pointer-events: none; stroke-linejoin: round; }
  </style>
</head>
<body>
<div class="outer">

  <div class="schematic-row">
    <div class="ship-wrap">
      <img src="ShipTemplate.png" alt="Ship schematic blueprint" id="ship-img" draggable="false">

      <svg class="ov bloom bloom-svg" id="trace-canvas" viewBox="0 0 1538 688" width="1538" height="688" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
        <g id="b-eng" class="zone" style="color:#4ade80">
          <polygon points="504.4,71.5 506.6,88.5 508.3,101.3 509.4,109.9 510.0,114.4 510.0,114.6 500.7,114.8 482.1,114.9 454.1,115.0 416.9,115.0 388.8,114.0 369.8,112.0 359.9,109.0 359.1,105.0 358.6,99.4 358.2,92.1 358.0,83.2 358.0,72.8 358.1,64.8 358.2,59.4 358.4,56.6 358.6,56.4 359.8,55.6 361.9,54.2 365.0,52.2 369.0,49.8 379.9,47.9 397.6,46.6 422.2,46.0 453.8,46.0 477.9,50.2 494.8,58.8"/>
          </g>
        <g id="b-drn" class="zone" style="color:#4ade80">
          <rect x="372" y="128" width="149" height="110" rx="10"/>
        </g>
        <g id="b-wpn" class="zone" style="color:#4ade80">
          <rect x="540" y="458" width="146" height="32" rx="5"/>
        </g>
        <g id="b-shd" class="zone" style="color:#4ade80">
          <polygon points="958,490 992,508 992,538 958,556 925,538 925,508"/>
        </g>
        
        <g id="tracer-layer"></g>
      </svg>

      <svg class="ov tint tint-svg" viewBox="0 0 1538 688" width="1538" height="688" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
        <g id="t-eng" class="zone" style="color:#4ade80">
          <polygon points="504.4,71.5 506.6,88.5 508.3,101.3 509.4,109.9 510.0,114.4 510.0,114.6 500.7,114.8 482.1,114.9 454.1,115.0 416.9,115.0 388.8,114.0 369.8,112.0 359.9,109.0 359.1,105.0 358.6,99.4 358.2,92.1 358.0,83.2 358.0,72.8 358.1,64.8 358.2,59.4 358.4,56.6 358.6,56.4 359.8,55.6 361.9,54.2 365.0,52.2 369.0,49.8 379.9,47.9 397.6,46.6 422.2,46.0 453.8,46.0 477.9,50.2 494.8,58.8"/>
        </g>
        <g id="t-drn" class="zone" style="color:#4ade80">
          <rect x="372" y="128" width="149" height="110" rx="10"/>
        </g>
        <g id="t-wpn" class="zone" style="color:#4ade80">
          <rect x="540" y="458" width="146" height="32" rx="5"/>
        </g>
        <g id="t-shd" class="zone" style="color:#4ade80">
          <polygon points="958,490 992,508 992,538 958,556 925,538 925,508"/>
        </g>
      </svg>

      <div class="bar-overlay">
        <div class="ibar" style="left:74.8%; top:24.4%; width:21.6%; height:6.6%"><div class="ibar-fill" id="ifill-sys"></div></div>
        <div class="ibar" style="left:74.8%; top:44.2%; width:21.6%; height:5.8%"><div class="ibar-fill" id="ifill-drones"></div></div>
        <div class="ibar" style="left:74.8%; top:62.5%; width:21.6%; height:5.8%"><div class="ibar-fill" id="ifill-weapons"></div></div>
        <div class="ibar" style="left:74.8%; top:80.6%; width:21.6%; height:5.8%"><div class="ibar-fill" id="ifill-shields"></div></div>
      </div>
    </div>

    <div class="power-panel">
      <div class="pp-title">main power</div>
      <div class="pp-main">
        <span class="mp-label">reactor status</span>
        <span class="engine-status" id="engine-status">NOMINAL</span>
        <div class="pp-top-bar-wrap">
          <div class="seg" id="seg-sys"     style="width:25%;background:#4ade80"></div>
          <div class="seg" id="seg-drones"  style="width:25%;background:#2bbf6a"></div>
          <div class="seg" id="seg-weapons" style="width:25%;background:#1c9c52"></div>
          <div class="seg" id="seg-shields" style="width:25%;background:#137a3c"></div>
          <div class="seg" id="seg-empty"   style="width:0%;background:#0a1a0a"></div>
        </div>
        <div class="total-row">
          <span class="total-val" id="total-val-disp">100%</span>
          <span>total allocated</span>
        </div>
      </div>
    </div>
  </div>

  <div class="sliders-row">
    <div class="sl-block">
      <div class="sl-header"><span class="sl-name">⬡ engines</span><span class="sl-pct" id="pct-sys">25%</span></div>
      <input type="range" min="0" max="25" step="1" value="25" id="sl-sys" oninput="onSlide('sys',this.value)">
    </div>
    <div class="sl-block">
      <div class="sl-header"><span class="sl-name">⬡ drones</span><span class="sl-pct" id="pct-drones">25%</span></div>
      <input type="range" min="0" max="25" step="1" value="25" id="sl-drones" oninput="onSlide('drones',this.value)">
    </div>
    <div class="sl-block">
      <div class="sl-header"><span class="sl-name">⬡ weapons</span><span class="sl-pct" id="pct-weapons">25%</span></div>
      <input type="range" min="0" max="25" step="1" value="25" id="sl-weapons" oninput="onSlide('weapons',this.value)">
    </div>
    <div class="sl-block">
      <div class="sl-header"><span class="sl-name">⬡ shields</span><span class="sl-pct" id="pct-shields">25%</span></div>
      <input type="range" min="0" max="25" step="1" value="25" id="sl-shields" oninput="onSlide('shields',this.value)">
    </div>
  </div>

  <div class="log-area">
    <div class="log-hdr">▸ system status log</div>
    <div id="log-entries">
      <div class="log-entry">
        <span class="log-t">00:00:00</span>
        <span class="log-m">— power grid initialized. engines and all systems nominal at 25%.</span>
      </div>
    </div>
  </div>
</div>

<div class="tracer-panel">
  <div class="tracer-title">SVG Draw Tool <span>(Click & Drag)</span></div>
  
  <div class="apply-row">
    <select id="target-system">
      <option value="eng">Engines</option>
      <option value="drn">Drones</option>
      <option value="wpn">Weapons</option>
      <option value="shd">Shields</option>
    </select>
    <button onclick="applyTracedShape()">Override Path ↑</button>
  </div>

  <textarea id="tracer-output" readonly placeholder="Shape points will appear here..."></textarea>
  
  <div class="tracer-controls">
    <button class="clear-btn" onclick="tracerClear()">Clear Shape</button>
    <button onclick="tracerCopy()">Copy Raw Points</button>
  </div>
</div>

<script>
  // ==========================================
  // DASHBOARD LOGIC (Unchanged)
  // ==========================================
  const LABELS = { sys:'Engines', drones:'Drones', weapons:'Weapons', shields:'Shields' };
  const ZONE   = { sys:'eng', drones:'drn', weapons:'wpn', shields:'shd' };
  const prev   = { sys:25, drones:25, weapons:25, shields:25 };

  function zoneColor(v) {
    if (v === 0) return { c:'#ef4444', pulse:true };
    return { c:`hsl(${(v/25)*120}, 85%, 55%)`, pulse:false };
  }
  
  const t0 = Date.now();
  function ts() {
    const s = Math.floor((Date.now()-t0)/1000);
    return [Math.floor(s/3600), Math.floor((s%3600)/60), s%60]
      .map(n=>String(n).padStart(2,'0')).join(':');
  }

  function log(msg, type) {
    const el = document.getElementById('log-entries');
    const r  = document.createElement('div');
    r.className = 'log-entry';
    r.innerHTML = `<span class="log-t">${ts()}</span><span class="log-m ${type||''}">${msg}</span>`;
    el.prepend(r);
    if (el.children.length > 60) el.lastChild.remove();
  }

  function val(k) { return parseInt(document.getElementById('sl-'+k).value); }

  function onSlide(key, rawVal) {
    let v = parseInt(rawVal);
    const others = ['sys','drones','weapons','shields'].filter(k=>k!==key);
    const otherSum = others.reduce((a,k)=>a+val(k), 0);
    if (v + otherSum > 100) { v = Math.max(0, 100 - otherSum); }
    document.getElementById('sl-'+key).value = v;

    updateAll();

    const p = prev[key], lbl = LABELS[key];
    if (v < p) {
      if (v === 0) log(`⚡ ${lbl} OFFLINE — power cut. system down.`, 'drop');
      else         log(`↓ ${lbl} power ${p}% → ${v}%.`, 'drop');
    } else if (v > p) {
      if (p === 0) log(`↑ ${lbl} RESTORED — online at ${v}%.`, 'gain');
      else         log(`↑ ${lbl} power ${p}% → ${v}%.`, 'gain');
    }
    prev[key] = v;
  }

  function updateAll() {
    const vals = { sys:val('sys'), drones:val('drones'), weapons:val('weapons'), shields:val('shields') };
    const total     = vals.sys + vals.drones + vals.weapons + vals.shields;
    const remaining = Math.max(0, 100 - total);

    ['sys','drones','weapons','shields'].forEach(k => {
      const v = vals[k];

      document.getElementById('pct-'+k).textContent = v+'%';
      document.getElementById('pct-'+k).className = 'sl-pct' + (v===0?' low': v<=8?' warn':'');

      const fill = document.getElementById('ifill-'+k);
      fill.style.width   = ((v/25)*100)+'%';
      fill.style.opacity = v===0 ? '0' : '1';

      const { c, pulse } = zoneColor(v);
      ['t-','b-'].forEach(pre => {
        const g = document.getElementById(pre+ZONE[k]);
        if(g) {
            g.style.color = c;
            g.classList.toggle('pulse', pulse);
        }
      });

      document.getElementById('seg-'+k).style.width = v+'%';
    });

    document.getElementById('seg-empty').style.width = remaining+'%';

    const tv = document.getElementById('total-val-disp');
    tv.textContent = total+'%';
    tv.className = 'total-val' + (total > 100 ? ' over' : '');

    const es = document.getElementById('engine-status');
    const ev = vals.sys;
    if      (ev === 0)  { es.textContent='OFFLINE';  es.style.color='#ef4444'; }
    else if (ev <=  8)  { es.textContent='CRITICAL'; es.style.color='#ef4444'; }
    else if (ev <= 16)  { es.textContent='REDUCED';  es.style.color='#f59e0b'; }
    else if (ev <  25)  { es.textContent='PARTIAL';  es.style.color='#9be8b4'; }
    else                { es.textContent='NOMINAL';  es.style.color='#4ade80'; }
  }

  updateAll();

  // ==========================================
  // DRAW TOOL & OVERRIDE LOGIC
  // ==========================================
  const tracerPts = [];
  const svgCanvas = document.getElementById('trace-canvas');
  const tracerGroup = document.getElementById('tracer-layer');
  const tracerOutput = document.getElementById('tracer-output');
  
  let isDrawing = false;
  let lastX = 0, lastY = 0;

  // Start Drawing
  svgCanvas.addEventListener('mousedown', function(e) {
    e.preventDefault(); // Prevents dragging images/text accidentally
    isDrawing = true;
    tracerPts.length = 0; // Wipe previous shape
    addPoint(e);
  });

  // Continue Drawing
  svgCanvas.addEventListener('mousemove', function(e) {
    if (!isDrawing) return;
    addPoint(e);
  });

  // End Drawing
  window.addEventListener('mouseup', function(e) {
    if (isDrawing) {
      isDrawing = false;
      renderTracer(); // Renders the final closed polygon string
    }
  });
  
  // Failsafe if mouse leaves the SVG area
  svgCanvas.addEventListener('mouseleave', function(e) {
    if (isDrawing) {
      isDrawing = false;
      renderTracer();
    }
  });

  function addPoint(e) {
    const pt = svgCanvas.createSVGPoint();
    pt.x = e.clientX;
    pt.y = e.clientY;
    
    const svgP = pt.matrixTransform(svgCanvas.getScreenCTM().inverse());
    
    // Throttle point creation: only log point if moved more than 4 units
    // This keeps the SVG path from getting absurdly long and computationally heavy
    if (tracerPts.length > 0) {
      const dist = Math.hypot(svgP.x - lastX, svgP.y - lastY);
      if (dist < 4) return;
    }

    lastX = svgP.x;
    lastY = svgP.y;
    
    tracerPts.push(`${svgP.x.toFixed(1)},${svgP.y.toFixed(1)}`);
    renderTracer();
  }

  function renderTracer() {
    tracerGroup.innerHTML = ''; 

    if (tracerPts.length === 0) {
      tracerOutput.value = '';
      return;
    }

    const polygon = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
    polygon.setAttribute("points", tracerPts.join(" "));
    polygon.setAttribute("class", "tracer-shape");
    tracerGroup.appendChild(polygon);

    tracerOutput.value = tracerPts.join(" ");
  }

  function tracerClear() {
    tracerPts.length = 0;
    renderTracer();
  }

  function tracerCopy() {
    if(tracerPts.length === 0) return;
    tracerOutput.select();
    document.execCommand('copy');
    log('▸ Raw shape coordinates copied to clipboard.', 'gain');
  }

  // Inject memory path directly into selected DOM elements
  function applyTracedShape() {
    if (tracerPts.length < 3) {
      log('⚠ Draw a complete shape before applying.', 'warn');
      return;
    }

    const targetZone = document.getElementById('target-system').value;
    const ptsString = tracerPts.join(" ");
    
    // Create new polygon string
    const newShapeHTML = `<polygon points="${ptsString}" />`;

    // Overwrite the specific groups in Bloom & Tint overlays
    const bloomGroup = document.getElementById('b-' + targetZone);
    const tintGroup = document.getElementById('t-' + targetZone);

    if (bloomGroup) bloomGroup.innerHTML = newShapeHTML;
    if (tintGroup)  tintGroup.innerHTML = newShapeHTML;

    // Get friendly name for log
    const systemName = document.querySelector(`#target-system option[value="${targetZone}"]`).textContent;
    log(`⟳ Override deployed: Custom path applied to ${systemName.toUpperCase()}.`, 'gain');
    
    // Trigger color update to immediately apply the correct current hue to the newly inserted tags
    updateAll(); 
  }
</script>
</body>
</html>
